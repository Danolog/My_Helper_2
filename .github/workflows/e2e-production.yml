name: Production E2E

on:
  deployment_status:

jobs:
  e2e-production:
    name: Production Health Checks
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 8
    env:
      BASE_URL: ${{ secrets.BETTER_AUTH_BASE_URL_PROD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Przegladarki sa wbudowane w obraz mcr.microsoft.com/playwright -> brak kroku
      # `playwright install` (pobranie systematycznie wisialo i zjadalo timeout joba).

      - name: Run production health checks
        run: pnpm exec playwright test --grep @production --workers=2 --retries=1 --timeout=15000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-production-report
          path: |
            playwright-report/
            test-results.json
          retention-days: 7
