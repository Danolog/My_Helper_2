name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: pos_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dev_user -d pos_dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # Kontener joba lezy w tej samej sieci Dockera co usluga `postgres`,
      # ktora jest osiagalna pod nazwa uslugi (`postgres`), nie pod `localhost`.
      POSTGRES_URL: postgresql://dev_user:dev_password@postgres:5432/pos_dev
      BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: pnpm db:push

      - name: Seed test data
        run: pnpm db:seed:test

      # Obraz Playwright nie ma `psql` (postgresql-client), a apt na tym runnerze
      # wisi -> diagnostyke seedow robimy w Node z pakietu `postgres` (jest w deps).
      - name: Verify seed data
        # Diagnostyka — nie blokuje E2E (testy i tak weryfikuja dane); chroni przed
        # ewentualnym bledem escapowania w node -e wewnatrz YAML/bash.
        continue-on-error: true
        run: |
          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.POSTGRES_URL);
          (async () => {
            try {
              const users = await sql\`SELECT id, email, email_verified, role FROM \\\"user\\\" WHERE email IN ('owner@test.com','client@test.com')\`;
              console.log('Seed users:', JSON.stringify(users, null, 2));
              const accounts = await sql\`SELECT id, provider_id, user_id, CASE WHEN password IS NOT NULL THEN 'SET' ELSE 'NULL' END AS pwd FROM account WHERE user_id IN ('test-owner-user-id-00001','test-client-user-id-00001')\`;
              console.log('Seed accounts:', JSON.stringify(accounts, null, 2));
              if (users.length < 2) { console.error('::warning::oczekiwano 2 uzytkownikow seed, znaleziono ' + users.length); }
            } catch (e) {
              console.error('::error::Verify seed data nieudane: ' + e.message);
              process.exit(1);
            } finally {
              await sql.end();
            }
          })();
          "

      # Przegladarki sa wbudowane w obraz mcr.microsoft.com/playwright -> brak kroku
      # `playwright install` (pobranie systematycznie wisialo i zjadalo timeout joba).

      - run: pnpm build:ci

      - name: Run smoke tests
        run: pnpm exec playwright test --grep @smoke --workers=4 --retries=1
        env:
          PLAYWRIGHT_TIMEOUT: 15000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-report
          path: |
            playwright-report/
            test-results.json
            tests/.auth/*.png
          retention-days: 7

  e2e-full:
    name: E2E Full Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [e2e-smoke]
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: pos_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dev_user -d pos_dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # Kontener joba lezy w tej samej sieci Dockera co usluga `postgres`,
      # ktora jest osiagalna pod nazwa uslugi (`postgres`), nie pod `localhost`.
      POSTGRES_URL: postgresql://dev_user:dev_password@postgres:5432/pos_dev
      BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: pnpm db:push

      - name: Seed test data
        run: pnpm db:seed:test

      # Przegladarki sa wbudowane w obraz mcr.microsoft.com/playwright -> brak kroku
      # `playwright install` (pobranie systematycznie wisialo i zjadalo timeout joba).

      - run: pnpm build:ci

      - name: Run full E2E tests
        run: pnpm exec playwright test --grep @full --workers=2 --retries=1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-full-report
          path: |
            playwright-report/
            test-results.json
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high
